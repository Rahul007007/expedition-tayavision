name: Question
description: Ask a question about the LLM fine-tuning project
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in the project! Please ask your question below.
  
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: How do I...?
    validations:
      required: true
  
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant context that might help us answer your question
      placeholder: |
        - What are you trying to achieve?
        - What have you already tried?
        - Any relevant code or configuration
  
  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Add any other information that might be helpful
  
